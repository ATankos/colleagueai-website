name: CI
on:
  push:
    branches: [main, golive-fixes]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build

      # Unit tests (vitest)
      # NOTE: 2 pre-existing failures in the legacy SPA language-toggle tests — the React
      # marketplace is no longer user-facing (/agents is prerendered static HTML).
      # Fix or delete those tests, then drop continue-on-error (tracked in ROADMAP.md).
      - run: npm run test:run
        continue-on-error: true

      # Go-live harness — all suites run offline / against a local replica
      - name: Webhook security & idempotency (signed test payloads, fake KV)
        run: node --test tests/webhook.test.mjs
      - name: Rate limiter
        run: node --test tests/ratelimit.test.mjs
      - name: DOM smoke (i18n engine, attribution, checkout config)
        run: node --test tests/dom-smoke.test.mjs
        # NOTE: fails until STORE price/payment links are configured (FIXES.md §1) —
        # remove this once checkout goes live:
        continue-on-error: true
      - name: i18n integrity (parity, leakage, compliance claims, mojibake)
        run: node tests/audit-i18n.mjs
      - name: Secret scan of build output
        run: node tests/scan-bundle.mjs
      - name: Headers/SEO audit vs local replica of vercel.json
        run: |
          node tests/local-server.mjs 4173 &
          sleep 1
          BASE_URL=http://localhost:4173 node tests/audit-headers.mjs
        # 4 known-open findings (CSP inline, /demo prerender, locale canonicals) — see ROADMAP.md.
        continue-on-error: true

      - name: Upload harness evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: harness-results
          path: tests/results/
          if-no-files-found: ignore
