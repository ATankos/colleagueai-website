name: CI

"on":
  push:
    branches:
      - main
      - golive-fixes
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run build

      - name: HTML integrity gate (tag balance, leaked code, orphaned tags, anchors)
        run: node tests/integrity-check.mjs

      - name: Unit tests
        run: npm run test:run

      - name: Webhook security and idempotency
        run: node --test tests/webhook.test.mjs

      - name: Rate limiter
        run: node --test tests/ratelimit.test.mjs

      - name: DOM smoke
        run: node --test tests/dom-smoke.test.mjs
        continue-on-error: true

      - name: i18n integrity
        run: node tests/audit-i18n.mjs

      - name: Secret scan of build output
        run: node tests/scan-bundle.mjs

      - name: Headers and SEO audit against local replica
        run: |
          node tests/local-server.mjs 4173 &
          sleep 1
          BASE_URL=http://localhost:4173 node tests/audit-headers.mjs
        continue-on-error: true

      - name: Upload harness evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: harness-results
          path: tests/results/
          if-no-files-found: ignore

  e2e:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Install Playwright browser (chromium)
        run: npx playwright install --with-deps chromium

      - name: Go-live e2e — real static pages, nav, drawer, demo, locales
        run: npx playwright test golive.spec.js --project=chromium --project=mobile-chrome

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore
