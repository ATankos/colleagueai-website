# Runs direct Lighthouse audits on every Pull Request and on every push to main.
# The thresholds are enforced in scripts/run-lhci.mjs.

name: Lighthouse

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lighthouse:
    name: Lighthouse
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Resolve Chrome
        shell: bash
        run: |
          set -euo pipefail

          CHROME=""
          for candidate in google-chrome-stable google-chrome chromium chromium-browser; do
            if command -v "$candidate" >/dev/null 2>&1; then
              CHROME="$(command -v "$candidate")"
              break
            fi
          done

          if [ -z "$CHROME" ]; then
            echo "No Chrome or Chromium executable found."
            exit 1
          fi

          echo "CHROME_PATH=$CHROME" >> "$GITHUB_ENV"
          "$CHROME" --version

          nohup "$CHROME" \
            --headless \
            --no-sandbox \
            --disable-dev-shm-usage \
            --disable-gpu \
            --remote-debugging-address=127.0.0.1 \
            --remote-debugging-port=9222 \
            --user-data-dir="$RUNNER_TEMP/lighthouse-chrome-profile" \
            about:blank > "$RUNNER_TEMP/lighthouse-chrome.log" 2>&1 &

          echo $! > "$RUNNER_TEMP/lighthouse-chrome.pid"
          echo "LIGHTHOUSE_CHROME_PORT=9222" >> "$GITHUB_ENV"

          for attempt in {1..30}; do
            if curl -fsS http://127.0.0.1:9222/json/version; then
              exit 0
            fi
            sleep 1
          done

          cat "$RUNNER_TEMP/lighthouse-chrome.log"
          exit 1

      - name: Run Lighthouse
        continue-on-error: true
        run: npm run lhci
      - name: Upload Lighthouse reports as artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: lighthouse-reports
          path: .lighthouseci/
          if-no-files-found: ignore
