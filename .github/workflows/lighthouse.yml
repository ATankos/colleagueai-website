# Runs direct Lighthouse audits on every Pull Request and on every push to main.
# The thresholds are enforced in scripts/run-lhci.mjs.

name: Lighthouse

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lighthouse:
    name: Lighthouse
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Resolve Chrome
        shell: bash
        run: |
          set -euo pipefail

          CHROME=""
          for candidate in google-chrome-stable google-chrome chromium chromium-browser; do
            if command -v "$candidate" >/dev/null 2>&1; then
              CHROME="$(command -v "$candidate")"
              break
            fi
          done

          if [ -z "$CHROME" ]; then
            echo "No Chrome or Chromium executable found."
            exit 1
          fi

          echo "CHROME_PATH=$CHROME" >> "$GITHUB_ENV"
          "$CHROME" --version
          "$CHROME" --headless --no-sandbox --disable-dev-shm-usage --disable-gpu --dump-dom about:blank >/tmp/chrome-smoke.html
          test -s /tmp/chrome-smoke.html

      - name: Run Lighthouse
        run: npm run lhci
      - name: Upload Lighthouse reports as artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: lighthouse-reports
          path: .lighthouseci/
          if-no-files-found: ignore
