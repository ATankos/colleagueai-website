# Runs direct Lighthouse audits on every Pull Request and on every push to main.
# The thresholds are enforced in scripts/run-lhci.mjs.

name: Lighthouse

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lighthouse:
    name: Lighthouse
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Lighthouse
        run: npm run lhci

      - name: Upload Lighthouse reports as artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: lighthouse-reports
          path: .lighthouseci/
          if-no-files-found: ignore
