# Runs Lighthouse CI on every Pull Request and on every push to main.
# Blocks PR merge if Performance / Accessibility / Best Practices / SEO
# drop below the thresholds defined in lighthouserc.cjs.

name: Lighthouse CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install deps
        run: npm ci

      - name: Build production bundle
        run: npm run build

      - name: Run Lighthouse CI
        run: npx lhci autorun
        env:
          # If a secret named LHCI_GITHUB_APP_TOKEN is added later, LHCI will
          # also post a "Lighthouse" check directly into the PR UI. Optional.
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

      - name: Upload Lighthouse reports as artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: lighthouse-reports
          path: .lighthouseci/
          retention-days: 14
